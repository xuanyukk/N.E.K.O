<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/static/neko_192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title data-i18n="app.title">Project N.E.K.O.</title>
    <!-- VRM 光照默认值：从后端注入，保证在所有 JS 之前同步可用 -->
    <script>window.VRM_DEFAULT_LIGHTING=Object.freeze({{ vrm_defaults | tojson }});</script>
    <!-- Electron Pet 窗口标记：必须在任何样式表之前同步执行，给 <html> 打上
         lanlan-pet-mode，让 index.css 的 (max-width:768px) 手机端规则（黑背景、
         窄布局）整段排除掉。Electron preload 在页面脚本之前注入这些全局，所以这里
         能同步读到；同时兜底匹配 userAgent，避免首帧黑屏闪烁。dev 浏览器（无这些
         信号）不打标记，窄宽手机版行为保持不变。 -->
    <script>(function () {
        try {
            var w = window;
            var isElectronPet = !!(w.electronDesktopCapturer || w.electronSpatialAudio || w.electronShell)
                || w.__NEKO_MULTI_WINDOW__ === true
                || /Electron/i.test(navigator.userAgent || '')
                || !!(w.process && w.process.versions && w.process.versions.electron);
            w.__LANLAN_IS_ELECTRON_PET__ = isElectronPet;
            if (isElectronPet) {
                document.documentElement.classList.add('lanlan-pet-mode');
            }
        } catch (e) { /* 检测失败按非 Electron 处理，退回浏览器行为 */ }
    })();</script>
    <!-- 诊断观测：必须最早加载——内部 monkey-patch setInterval/setTimeout 计数活跃
         timer，业务代码之后加载就抓不到早期注册的那些。默认关，靠
         localStorage.NEKO_DEBUG_HEALTH=1 + 刷新启用。详见 static/debug-health.js。 -->
    <script src="/static/debug-health.js?v={{ static_asset_version }}"></script>
    <!-- i18next 加载器（统一处理 CDN 加载和初始化） -->
    <script src="/static/i18n-i18next.js?v={{ static_asset_version }}"></script>
    <script src="/static/common_dialogs.js?v={{ static_asset_version }}"></script>
    <link rel="stylesheet" href="/static/css/index.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/storage-location.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/subtitle.css?v={{ static_asset_version }}">
    <style>/* React chat adapter: hide old chat */
    #chat-container { display: none !important; visibility: hidden !important; }</style>
    <script>window.__NEKO_REACT_CHAT_ASSET_VERSION__={{ react_chat_asset_version | tojson }};</script>
    <link rel="stylesheet" href="/static/react/neko-chat/neko-chat-window.css?v={{ react_chat_asset_version }}">
    <link rel="stylesheet" href="/static/css/avatar-reaction-bubble.css?v={{ static_asset_version }}">
    <!-- 暗色模式样式 -->
    <link rel="stylesheet" href="/static/css/dark-mode.css?v={{ static_asset_version }}">
    <!-- 主题管理器（尽早加载以避免闪烁） -->
    <script src="/static/theme-manager.js?v={{ static_asset_version }}"></script>

    <!-- Driver.js 新手引导库 (本地实现 - 无需 CDN) -->
    <script src="/static/libs/driver.min.js?v={{ static_asset_version }}"></script>
    <link rel="stylesheet" href="/static/libs/driver.min.css?v={{ static_asset_version }}">
    <!-- 教程样式定制 -->
    <link rel="stylesheet" href="/static/css/tutorial-styles.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/yui-guide.css?v={{ static_asset_version }}">
    <!-- APlayer 库（本地） -->
    <link rel="stylesheet" href="/static/libs/APlayer.min.css?v={{ static_asset_version }}">
    <script src="/static/libs/APlayer.min.js?v={{ static_asset_version }}"></script>
</head>

<body class="subtitle-web-host"{% if initial_chat_surface_mode is defined and initial_chat_surface_mode %}
      data-initial-chat-surface-mode="{{ initial_chat_surface_mode }}"{% endif %}>
    <!-- 同步把 Electron Pet 标记补到 body（head 脚本执行时 body 尚不存在）；
         在 chat-container 等内容解析之前执行，避免窄窗口下手机布局闪一帧。 -->
    <script>(function () {
        if (window.__LANLAN_IS_ELECTRON_PET__) {
            document.body.classList.add('lanlan-pet-mode');
        }
    })();</script>

    <!-- 旧的按钮面板已迁移到浮动按钮系统（live2d.js），保留隐藏的旧按钮元素供功能触发使用 -->
    <div id="sidebar" style="display: none;">
        <div id="sidebarbox">
            <button id="micButton" class="side-btn" data-i18n="voiceControl.startVoice">🎤 开始语音</button>
            <button id="muteButton" class="side-btn" disabled data-i18n="voiceControl.rest">⏸️ 休息一下</button>
            <button id="screenButton" class="side-btn" disabled data-i18n="voiceControl.screenShare">🖥️ 屏幕共享</button>
            <button id="stopButton" class="side-btn" disabled data-i18n="voiceControl.stopShare">🛑 停止共享</button>
            <button id="resetSessionButton" class="side-btn" data-i18n="voiceControl.leave">👋 请她离开</button>
            <button id="returnSessionButton" class="side-btn" data-i18n="voiceControl.return">🫴 请她回来</button>
            <div id="status"></div>
        </div>
    </div>

    <!-- Status 气泡框 -->
    <div id="status-toast"></div>
    <div id="chat-container">
        <div id="chat-header">
            <img src="/static/icons/chat_icon.png" data-i18n-alt="chat.title" alt="对话" style="width: 28px; height: 28px; object-fit: contain; margin-right: 6px; vertical-align: middle; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
            <span id="chat-title" data-i18n="chat.title">对话</span>
        </div>
        <button id="toggle-chat-btn" data-i18n-title="common.minimize" title="最小化"><img
                src='/static/icons/expand_icon_off.png' alt="最小化" data-i18n-alt="common.minimize"
                width="32" height="32"
                style="object-fit: cover; pointer-events: none;"></button>
        <div id="chat-tooltip" data-i18n="chat.tooltip">✨ 对话区</div>
        <div id="chat-content-wrapper">
            <div id="chat-content-actions">
                <button id="avatarPreviewButton" class="chat-header-action-btn chat-header-action-btn-avatar" type="button"
                    data-i18n-title="chat.avatarPreview"
                    data-i18n-aria="chat.avatarPreview">
                    <svg class="chat-header-action-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z" />
                        <path d="M5.5 19.25a6.5 6.5 0 0 1 13 0" />
                    </svg>
                    <span class="chat-header-btn-label" data-i18n="chat.avatarPreviewLabel"></span>
                </button>
                <button id="reactChatWindowButton" class="chat-header-action-btn chat-header-action-btn-react-window" type="button"
                    data-i18n-title="chat.reactWindowOpen"
                    data-i18n-aria="chat.reactWindowOpen">
                    <svg class="chat-header-action-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4.75 6.75h14.5a1.5 1.5 0 0 1 1.5 1.5v7.5a1.5 1.5 0 0 1-1.5 1.5H4.75a1.5 1.5 0 0 1-1.5-1.5v-7.5a1.5 1.5 0 0 1 1.5-1.5Z" />
                        <path d="M8 17.25v1.5h8v-1.5" />
                        <path d="M3.25 10.25h17.5" />
                    </svg>
                    <span class="chat-header-btn-label" data-i18n="chat.reactWindowLabel">聊天框</span>
                </button>
            </div>
            <div id="chatContainer"></div>
        </div>
        <div id="text-input-area">
            <div id="screenshot-thumbnail-container">
                <div id="screenshots-header">
                    <span id="screenshots-title" data-i18n="chat.screenshotsTitle">📸 待发送截图</span><span
                        id="screenshot-count-wrapper"> (<span id="screenshot-count">0</span>)</span>
                    <button id="clear-all-screenshots" data-i18n="chat.clearAll">清空全部</button>
                </div>
                <div id="screenshots-list">
                    <!-- 截图项将动态添加到这里 -->
                </div>
            </div>
            <div id="text-input-row">
                <textarea id="textInputBox" data-i18n-placeholder="chat.textInputPlaceholder"
                    placeholder="文字聊天模式...回车发送，Shift+回车换行" tabindex="0"></textarea>
                <div id="button-group">
                    <button id="textSendButton"><img src="/static/icons/send_icon.png" alt=""><span
                            data-i18n="chat.send">发送</span></button>
                    <button id="screenshotButton"><img src="/static/icons/chat_shot.png" alt=""><span
                            class="desktop-text" data-i18n="chat.screenshot">截图</span><span class="mobile-text"
                            data-i18n="chat.takePhoto">拍照</span></button>
                </div>
            </div>
        </div>
        <!-- 字幕提示框现在通过JavaScript动态创建为系统消息，不再需要静态HTML -->
    </div>
    <!-- 字幕显示区域 -->
    <div id="subtitle-display" class="hidden">
        <div id="subtitle-scroll">
            <span id="subtitle-text"></span>
        </div>
        <button type="button" id="subtitle-settings-btn" title="Subtitle Settings" aria-label="Subtitle Settings" data-i18n-title="subtitle.settings.settingsBtn" data-i18n-aria="subtitle.settings.settingsBtn">
            <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z"/>
            </svg>
        </button>
        <div id="subtitle-settings-panel" class="hidden">
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label" data-i18n="subtitle.settings.targetLang" data-subtitle-label="targetLang">目标语言</span>
                <select id="subtitle-lang-select" data-i18n-title="subtitle.settings.targetLang" title="目标语言">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="ru">Русский</option>
                    <option value="es">Español</option>
                    <option value="pt">Português</option>
                </select>
            </div>
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label" data-i18n="subtitle.settings.opacity" data-subtitle-label="opacity">不透明度</span>
                <input type="range" id="subtitle-opacity-slider" min="20" max="100" value="95" data-i18n-title="subtitle.settings.opacity" title="不透明度">
                <span id="subtitle-opacity-value">95%</span>
            </div>
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label" data-i18n="subtitle.settings.dragAnywhere" data-subtitle-label="dragAnywhere">整体拖动</span>
                <label class="subtitle-settings-switch">
                    <input type="checkbox" id="subtitle-drag-mode-toggle" data-i18n-aria="subtitle.settings.dragAnywhere" aria-label="整体拖动开关">
                    <span class="subtitle-settings-track"></span>
                </label>
            </div>
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label" data-i18n="subtitle.settings.size" data-subtitle-label="size">大小</span>
                <div class="subtitle-size-group">
                    <button type="button" class="subtitle-size-btn" data-size="small" data-i18n="subtitle.settings.sizeSmall">小</button>
                    <button type="button" class="subtitle-size-btn active" data-size="medium" data-i18n="subtitle.settings.sizeMedium">中</button>
                    <button type="button" class="subtitle-size-btn" data-size="large" data-i18n="subtitle.settings.sizeLarge">大</button>
                </div>
            </div>
        </div>
        <div id="subtitle-drag-handle">
            <!-- 四向箭头图标 -->
            <div id="subtitle-drag-arrows">
                <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <!-- 上箭头 -->
                    <path d="M12 3L8.5 8H10.5V10.5H13.5V8H15.5L12 3Z"/>
                    <!-- 下箭头 -->
                    <path d="M12 21L15.5 16H13.5V13.5H10.5V16H8.5L12 21Z"/>
                    <!-- 左箭头 -->
                    <path d="M3 12L8 8.5V10.5H10.5V13.5H8V15.5L3 12Z"/>
                    <!-- 右箭头 -->
                    <path d="M21 12L16 15.5V13.5H13.5V10.5H16V8.5L21 12Z"/>
                    <!-- 中心点 -->
                    <circle cx="12" cy="12" r="1.2"/>
                </svg>
            </div>
        </div>
    </div>
    <div id="react-chat-window-overlay" hidden>
        <div id="react-chat-window-backdrop"></div>
        <div id="react-chat-window-shell" role="dialog" aria-modal="true" aria-labelledby="react-chat-window-title">
            <div id="react-chat-window-drag-handle" aria-hidden="true"></div>
            <div id="react-chat-window-header-actions">
                <button id="avatarPreviewHeaderButton" type="button"
                        data-i18n-aria="chat.avatarPreview"
                        data-i18n-title="chat.avatarPreview"
                        aria-label="头像" title="头像">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 12a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z" />
                        <path d="M5.5 19.25a6.5 6.5 0 0 1 13 0" />
                    </svg>
                </button>
                <button id="exportConversationButton" type="button"
                        data-i18n-aria="chat.exportConversation"
                        data-i18n-title="chat.exportConversation"
                        aria-label="导出对话" title="导出对话">
                    <img src="/static/icons/fenxiang.svg" alt="" aria-hidden="true" width="20" height="20">
                </button>
                <button id="reactChatWindowMinimizeButton" type="button" data-i18n-aria="chat.reactWindowMinimize" data-i18n-title="chat.reactWindowMinimize">
                    <img id="reactChatWindowMinimizeIcon" src="/static/icons/expand_icon_off.png" data-i18n-alt="chat.reactWindowMinimize" alt="最小化聊天框" width="32" height="32">
                </button>
                <button id="reactChatWindowCloseButton" type="button" data-i18n-aria="chat.reactWindowClose" data-i18n-title="chat.reactWindowClose">×</button>
            </div>
            <div id="react-chat-window-root"></div>
        </div>
    </div>
    <!-- 独立头像预览弹窗（chat.html / index.html 共用）-->
    <div id="chat-avatar-preview-popup" class="chat-avatar-preview-popup" role="dialog" aria-modal="false" aria-labelledby="chat-avatar-preview-popup-title" hidden>
        <div class="chat-avatar-preview-card-header">
            <div class="chat-avatar-preview-card-title-group">
                <div id="chat-avatar-preview-popup-title" class="chat-avatar-preview-card-title" data-i18n="chat.avatarPreviewCardTitle">当前头像</div>
                <div id="chat-avatar-preview-status" class="chat-avatar-preview-card-status" data-i18n="chat.avatarPreviewCardStatus">点击上方按钮生成当前模型头像</div>
            </div>
            <button id="chatAvatarPreviewCloseButton" class="chat-avatar-preview-card-close" type="button" data-i18n-title="chat.avatarPreviewClose" data-i18n-aria="chat.avatarPreviewClose" aria-label="关闭头像预览">×</button>
        </div>
        <div class="chat-avatar-preview-card-body">
            <div id="chat-avatar-preview-image-shell" class="chat-avatar-preview-image-shell is-empty">
                <img id="chat-avatar-preview-image" class="chat-avatar-preview-image" data-i18n-alt="chat.avatarPreviewImageAlt" alt="当前头像预览" hidden>
                <div id="chat-avatar-preview-placeholder" class="chat-avatar-preview-placeholder" data-i18n="chat.avatarPreviewPlaceholder">AVATAR</div>
            </div>
            <div class="chat-avatar-preview-card-meta">
                <div id="chat-avatar-preview-note" class="chat-avatar-preview-card-note" data-i18n="chat.avatarPreviewCardNote">将基于当前显示中的 Live2D / VRM / MMD 模型生成头像。</div>
                <button id="chatAvatarPreviewRefreshButton" class="chat-avatar-preview-refresh-btn" type="button" data-i18n="chat.avatarPreviewRefresh">刷新头像</button>
            </div>
        </div>
        <div class="chat-avatar-preview-crop-body">
            <div class="avatar-cropper-area">
                <div id="avatar-cropper-wrap" class="avatar-cropper-canvas-wrap">
                    <img id="avatar-cropper-img" class="avatar-cropper-source-img" alt="">
                    <svg id="avatar-cropper-mask" class="avatar-cropper-mask"></svg>
                    <div id="avatar-cropper-box" class="avatar-cropper-crop-box">
                        <div class="avatar-cropper-viewfinder">
                            <div class="avatar-cropper-grid-line h1"></div>
                            <div class="avatar-cropper-grid-line h2"></div>
                            <div class="avatar-cropper-grid-line v1"></div>
                            <div class="avatar-cropper-grid-line v2"></div>
                            <div class="avatar-cropper-circle-guide"></div>
                        </div>
                        <div class="avatar-cropper-handle tl" data-handle="tl"></div>
                        <div class="avatar-cropper-handle tr" data-handle="tr"></div>
                        <div class="avatar-cropper-handle bl" data-handle="bl"></div>
                        <div class="avatar-cropper-handle br" data-handle="br"></div>
                    </div>
                </div>
                <div class="avatar-cropper-controls">
                    <button class="avatar-cropper-ctrl-btn" data-crop-action="up" data-i18n-title="chat.avatarCropMoveUp" title="上移"><svg viewBox="0 0 16 16"><path d="M8 3L2 10h12z"/></svg></button>
                    <div class="avatar-cropper-controls-row">
                        <button class="avatar-cropper-ctrl-btn" data-crop-action="left" data-i18n-title="chat.avatarCropMoveLeft" title="左移"><svg viewBox="0 0 16 16"><path d="M3 8l7-6v12z"/></svg></button>
                        <button class="avatar-cropper-ctrl-btn" data-crop-action="center" data-i18n-title="chat.avatarCropCenter" title="居中"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
                        <button class="avatar-cropper-ctrl-btn" data-crop-action="right" data-i18n-title="chat.avatarCropMoveRight" title="右移"><svg viewBox="0 0 16 16"><path d="M13 8L6 2v12z"/></svg></button>
                    </div>
                    <button class="avatar-cropper-ctrl-btn" data-crop-action="down" data-i18n-title="chat.avatarCropMoveDown" title="下移"><svg viewBox="0 0 16 16"><path d="M8 13l6-7H2z"/></svg></button>
                    <div class="avatar-cropper-ctrl-divider"></div>
                    <button class="avatar-cropper-ctrl-btn" data-crop-action="bigger" data-i18n-title="chat.avatarCropZoomIn" title="放大"><svg viewBox="0 0 16 16"><path d="M3 8h10M8 3v10" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
                    <button class="avatar-cropper-ctrl-btn" data-crop-action="smaller" data-i18n-title="chat.avatarCropZoomOut" title="缩小"><svg viewBox="0 0 16 16"><path d="M3 8h10" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
                </div>
            </div>
            <div class="avatar-cropper-buttons">
                <button id="avatar-cropper-retake" class="avatar-cropper-btn" type="button" data-i18n="chat.avatarCropRetake">重新拍照</button>
                <div class="avatar-cropper-decision-buttons">
                    <button id="avatar-cropper-cancel" class="avatar-cropper-btn" type="button" data-i18n="chat.avatarCropCancel">取消</button>
                    <button id="avatar-cropper-save" class="avatar-cropper-btn primary" type="button" data-i18n="chat.avatarCropSave">保存</button>
                </div>
            </div>
        </div>
    </div>
    <div id="live2d-container">
        <canvas id="live2d-canvas"></canvas>
    </div>
    <!-- VRM模型容器 -->
    <div id="vrm-container" style="display: none;">
        <canvas id="vrm-canvas"></canvas>
    </div>
    <!-- MMD模型容器 -->
    <div id="mmd-container" style="display: none;">
        <canvas id="mmd-canvas"></canvas>
    </div>

    <script src="/static/libs/live2d.min.js?v={{ static_asset_version }}"></script>
    <script src="/static/libs/pixi.min.js?v={{ static_asset_version }}"></script>
    <script src="/static/libs/index.min.js?v={{ static_asset_version }}"></script>
    <script src="/static/libs/ogg-opus-decoder.min.js?v={{ static_asset_version }}"></script>
    <script src="/static/live2d-core.js?v={{ static_asset_version }}"></script>

    <!-- 游戏窗口联动：mini-game 路由激活时隐藏 live2d/vrm/mmd 容器（CSS class
         开关，避免 pet 透明窗口在 mini-game 进行时挡屏）。事件源是
         app-websocket.js dispatch 的 ``neko-game-window-state-change``，与
         chat.html 的折叠联动同源；多窗口模式下 RAW_MESSAGE forwarding 让
         pet 主窗 + chat.html follower 各自独立响应。 -->
    <script>
    (function() {
        'use strict';
        function applyGameWindowState(action) {
            if (!document.body || !document.body.classList) return;
            if (action === 'opened') {
                document.body.classList.add('neko-game-active');
            } else if (action === 'closed') {
                document.body.classList.remove('neko-game-active');
            }
        }
        window.addEventListener('neko-game-window-state-change', function(ev) {
            var detail = ev && ev.detail ? ev.detail : {};
            applyGameWindowState(detail.action || '');
        });
        // Bootstrap reconciliation：edge-triggered WS 事件只在 activate /
        // finalize 推送，pet 主窗加载时若 game 已经先跑起来了会听不到历史
        // opened，body class 不会加 neko-game-active → live2d/vrm/mmd 仍可见
        // 挡屏。init 路径主动查 /api/game/route/active 对齐。codex P1。
        // chat.html 用同一逻辑（在该模板 IIFE 内独立实现一份）。
        function syncGameWindowStateOnInit() {
            var lan = '';
            try {
                if (window.appState && typeof window.appState.lanlan_name === 'string') {
                    lan = window.appState.lanlan_name;
                }
                if (!lan && window.lanlan_config && typeof window.lanlan_config.lanlan_name === 'string') {
                    lan = window.lanlan_config.lanlan_name;
                }
            } catch (_) {}
            if (!lan) { setTimeout(syncGameWindowStateOnInit, 100); return; }
            fetch('/api/game/route/active?lanlan_name=' + encodeURIComponent(lan))
                .then(function(resp) { return resp && resp.ok ? resp.json() : null; })
                .then(function(data) {
                    if (!data || !data.active) return;
                    try {
                        window.dispatchEvent(new CustomEvent('neko-game-window-state-change', {
                            detail: {
                                action: 'opened',
                                lanlanName: data.lanlan_name || lan,
                                gameType: data.game_type || '',
                                sessionId: data.session_id || ''
                            }
                        }));
                    } catch (_) {}
                })
                .catch(function() {});
        }
        syncGameWindowStateOnInit();
    })();
    </script>
    <!-- 注意：初始化由 app.js 统一处理，避免重复初始化 -->
