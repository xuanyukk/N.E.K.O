<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta charset="UTF-8">
    <title data-i18n="voice.title">音色注册 - Project N.E.K.O.</title>
    <!-- i18next 加载器（统一处理 CDN 加载和初始化） -->
    <script src="/static/i18n-i18next.js?v={{ static_asset_version|default('0', true) }}"></script>
    <script src="/static/common_dialogs.js"></script>
    <link rel="stylesheet" href="/static/css/voice_clone.css">
    <link rel="stylesheet" href="/static/css/window_controls.css">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    <script src="/static/theme-manager.js"></script>
    <script src="/static/js/window_controls.js" defer></script>
    <link rel="stylesheet" href="/static/libs/driver.min.css?v={{ static_asset_version|default('0', true) }}">
    <link rel="stylesheet" href="/static/css/tutorial-styles.css?v={{ static_asset_version|default('0', true) }}">
</head>
<body>
    <div class="container">
        <div class="container-header page-title-bar">
            <h2 data-i18n="voice.title" data-text="Voice Registration">音色注册</h2>
            <div class="neko-window-actions">
                <a href="javascript:void(0)" onclick="openApiSettings()" class="goto-api-settings-btn" data-i18n="voice.gotoApiSettings">前往API设置</a>
                <div class="neko-window-controls">
                    <button type="button" class="neko-window-control-btn" data-neko-window-control="minimize" data-i18n-title="common.minimize" data-i18n-aria="common.minimize" title="最小化" aria-label="最小化">
                        <span class="neko-window-minimize-icon"></span>
                    </button>
                    <button type="button" class="neko-window-control-btn" data-neko-window-control="maximize" data-i18n-title="common.maximize" data-i18n-aria="common.maximize" title="最大化" aria-label="最大化">
                        <span class="neko-window-maximize-icon"></span>
                    </button>
                    <button class="close-page-btn" onclick="closeVoiceClonePage()" data-i18n-title="common.close" data-i18n-aria="common.close" aria-label="关闭">
                        <img src="/static/icons/close_button.png" alt="关闭" data-i18n-alt="common.close" draggable="false">
                    </button>
                </div>
            </div>
        </div>
        <div class="container-content">
            <div class="voice-register-main">
                <div class="field-row">
                    <label for="voiceProvider" data-i18n="voice.providerLabel">语音克隆服务商</label>
                    <select id="voiceProvider" class="api-provider-select">
                        <option value="cosyvoice" data-i18n="voice.provider.cosyvoice">阿里百炼 CosyVoice</option>
                        <option value="cosyvoice_intl" data-i18n="voice.provider.cosyvoice_intl">阿里国际版 CosyVoice</option>
                        <option value="minimax" data-i18n="voice.provider.minimax">MiniMax（国服）</option>
                        <option value="minimax_intl" data-i18n="voice.provider.minimax_intl">MiniMax（国际服）</option>
                        <option value="elevenlabs" data-i18n="voice.provider.elevenlabs">ElevenLabs</option>
                        <option value="mimo" data-i18n="voice.provider.mimo">MiMo（小米）</option>
                        <option value="doubao_tts" data-i18n="voice.provider.doubao_tts">豆包语音(火山引擎)</option>
                        <option value="vllm_omni" data-i18n="voice.provider.vllm_omni">vLLM-Omni（本地克隆）</option>
                    </select>
                </div>
                <div id="provider-notice" class="alibaba-api-notice" style="display: none;">
                    <span data-i18n="voice.alibabaApiRequired">此功能只支持特定语音模型，请在API密钥设置页中保存对应API Key（不要求启用辅助API）或配置本地语音服务器</span>
                </div>
                <div id="workshopVoiceSource" class="workshop-source-card" style="display: none;">
                    <div class="workshop-source-header">
                        <span class="workshop-source-badge" data-i18n="voice.workshopSourceBadge">创意工坊参考语音</span>
                        <span id="workshopVoiceSourceTitle" class="workshop-source-title" data-i18n="voice.workshopSourceTitle">创意工坊参考语音</span>
                    </div>
                    <div id="workshopVoiceSourceMeta" class="workshop-source-meta"></div>
                    <audio id="workshopVoicePreview" class="workshop-source-audio" controls style="display: none;"></audio>
                    <div id="workshopVoiceSourceStatus" class="workshop-source-status"></div>
                </div>
                <div class="field-row" id="voiceSourceRow">
                    <label data-i18n="voice.voiceSource">Voice Source</label>
                    <div class="clone-method-toggle voice-source-toggle" role="tablist" aria-label="声音来源选择">
                        <button type="button" class="clone-method-btn active" id="btnVoiceSourceClone" onclick="switchVoiceSource('clone')"
                            role="tab" aria-selected="true" aria-controls="cloneInputContainer" tabindex="0">
                            <span data-i18n="voice.sourceClone">声音克隆</span>
                        </button>
                        <button type="button" class="clone-method-btn" id="btnVoiceSourceDesign" onclick="switchVoiceSource('design')"
                            role="tab" aria-selected="false" aria-controls="voiceDesignSection" tabindex="-1">
                            <span data-i18n="voice.sourceDesign">声音设计</span>
                        </button>
                    </div>
                </div>
                <!-- 克隆方式切换 -->
                <div class="field-row" id="cloneMethodRow">
                    <label data-i18n="voice.cloneMethod">克隆方式</label>
                    <div class="clone-method-toggle" role="tablist" aria-label="克隆方式选择">
                        <button type="button" class="clone-method-btn active" id="btnFileClone" onclick="switchCloneMethod('file')"
                            role="tab" aria-selected="true" aria-controls="fileCloneSection" tabindex="0">
                            <span data-i18n="voice.cloneMethodFile">本地文件</span>
                        </button>
                        <button type="button" class="clone-method-btn" id="btnDirectLinkClone" onclick="switchCloneMethod('directlink')"
                            role="tab" aria-selected="false" aria-controls="directLinkCloneSection" tabindex="-1">
                            <span data-i18n="voice.cloneMethodDirectLink">直链克隆</span>
                        </button>
                    </div>
                </div>

                <!-- 克隆输入区域容器（固定高度防止切换时页面跳动） -->
                <div class="clone-input-container" id="cloneInputContainer">
                    <!-- 本地文件克隆区域 -->
                    <div id="fileCloneSection" class="clone-section">
                        <label class="section-label">
                            <img src="/static/icons/exclamation.png" alt="" class="section-icon">
                            <span data-i18n="voice.selectFile">选择本地音频文件（8秒最佳，请勿超过20秒，wav/mp3格式）</span>
                        </label>
                        <div class="file-input-wrapper">
                            <input type="file" id="audioFile" accept="audio/*">
                            <label for="audioFile" class="file-input-label" id="fileInputLabel">
                                <img src="/static/icons/import_model_button_icon.png?v=1" data-i18n-alt="voice.chooseFile" class="file-icon">
                                <span class="file-text" data-i18n="voice.chooseFile" data-text="Choose File">选择文件</span>
                            </label>
                            <div id="fileNameDisplay" class="file-name-display"></div>
                        </div>
                    </div>

                    <!-- 直链克隆区域 -->
                    <div id="directLinkCloneSection" class="clone-section" style="display: none;">
                        <label class="section-label">
                            <img src="/static/icons/exclamation.png" alt="" class="section-icon">
                            <span data-i18n="voice.directLinkUrl">音频直链URL（8秒最佳，请勿超过20秒，wav/mp3格式）</span>
                        </label>
                        <div class="field-row">
                            <input type="url" id="directLinkUrl" data-i18n-placeholder="voice.directLinkPlaceholder"
                                placeholder="https://example.com/audio.wav">
                        </div>
                        <label class="hint" data-i18n="voice.directLinkHint">输入可公网访问的音频文件直链，系统将跳过上传步骤直接使用该链接注册音色</label>
                    </div>
                    <div id="voiceDesignSection" class="clone-section voice-design-section" style="display: none;">
                        <label class="section-label">
                            <img src="/static/icons/exclamation.png" alt="" class="section-icon">
                            <span data-i18n="voice.designPromptLabel">Describe the voice you want to design</span>
                        </label>
                        <div class="field-row">
                            <textarea id="voiceDesignPrompt" rows="4" data-i18n-placeholder="voice.designPromptPlaceholder"
                                placeholder="A calm young woman with a warm, clear voice and gentle speaking style"></textarea>
                        </div>
                        <label id="voiceDesignHint" class="hint" data-i18n="voice.designHint">只描述音色，不要描述角色设定。试听使用与声音克隆相同的模板。</label>
                    </div>
                </div>

                <div class="field-row" id="refLanguageRow">
                    <label id="refLanguageLabel" for="refLanguage" data-i18n="voice.refLanguage">参考音频语言（注意：不是目标音频，是您上传的参考音频的语言）</label>
                    <label id="refLanguageHint" class="hint" data-i18n="voice.refLanguageNote">选择您上传的参考音频的语言，中文以外的语言需要指定</label>
                    <select id="refLanguage" class="api-provider-select">
                        <option value="ch" data-i18n="voice.lang.ch">中文</option>
                        <option value="en" data-i18n="voice.lang.en">英语</option>
                        <option value="fr" data-i18n="voice.lang.fr">法语</option>
                        <option value="de" data-i18n="voice.lang.de">德语</option>
                        <option value="ja" data-i18n="voice.lang.ja">日语</option>
                        <option value="ko" data-i18n="voice.lang.ko">韩语</option>
                        <option value="ru" data-i18n="voice.lang.ru">俄语</option>
                    </select>
                </div>

                <div class="field-row" id="vllmRefTextRow" style="display: none;">
                    <label for="vllmRefText" data-i18n="voice.vllmRefTextLabel">参考音频原文（vLLM-Omni 克隆必填，须与音频内容严格对应）</label>
                    <label class="hint" data-i18n="voice.vllmRefTextHint">逐字输入参考音频里说的话，文本与音频不符会导致克隆音质下降</label>
                    <textarea id="vllmRefText" rows="3" data-i18n-placeholder="voice.vllmRefTextPlaceholder" placeholder="例如：希望你以后能够做的比我还好呦"></textarea>
                </div>

                <div class="field-row">
                    <label data-i18n="voice.customPrefix">自定义前缀（必填，用于区分音色）</label>
                    <input type="text" id="prefix" data-i18n-placeholder="voice.prefixPlaceholder"
                        placeholder="Maximum 10 characters, numbers and English letters only" required>
                </div>

                <input type="hidden" id="lanlan_name" value="">

                <button class="register-voice-btn" onclick="registerVoice()">
                    <img src="/static/icons/sound.png" data-i18n-alt="voice.register" class="register-icon">
                    <span class="register-text" data-i18n="voice.register" data-text="Register Voice">注册音色</span>
                </button>

                <div class="result" id="result"></div>
            </div>

            <!-- 已注册音色列表 -->
            <div class="voice-list-section">
                <div class="voice-list-header">
                    <label class="voice-list-header-label">
                        <img src="/static/icons/key.png" alt="" class="section-icon">
                        <span data-i18n="voice.registeredVoices" class="voice-list-header-title">已注册音色</span>
                    </label>
                    <button class="btn sm" onclick="loadVoices()" id="refresh-voices-btn">
                        <span data-i18n="voice.refresh">刷新</span>
                    </button>
                </div>
                <div id="voice-list-container" class="voice-list-bg">
                    <div class="voice-list-loading" id="voice-list-loading">
                        <span data-i18n="voice.loading">加载中...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/voice_display_utils.js"></script>
    <script src="/static/js/voice_clone.js?v={{ static_asset_version|default('0', true) }}"></script>
    <script src="/static/js/voice_silence_remover.js"></script>

    <!-- API未设置提示弹窗 -->
    <div id="noApiModal" class="no-api-modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="noApiModalTitle">
        <div class="no-api-modal">
            <p id="noApiModalTitle" data-i18n="voice.noApiKeyPrompt">还没有设置任何可使用克隆功能的API，是否前往设置？</p>
            <button class="no-api-modal-btn" onclick="openApiSettings()">
                <span data-i18n="voice.gotoApiSettings">前往API设置</span>
            </button>
            <button class="no-api-modal-dismiss" onclick="document.getElementById('noApiModal').style.display='none';">
                <span data-i18n="voice.dismissNoApiPrompt">稍后再说</span>
            </button>
        </div>
    </div>

    <!-- 智能静音移除模态对话框 -->
    <div id="silenceModal" class="silence-modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="silenceModalTitle">
        <div class="silence-modal">
            <div class="silence-modal-header">
                <h3 id="silenceModalTitle" data-i18n="voice.silenceModal.title">智能空白音频检测结果</h3>
                <button class="silence-modal-close" onclick="closeSilenceModal()" aria-label="Close">&times;</button>
            </div>
            <div class="silence-modal-body">
                <!-- 分析结果 -->
                <div id="silenceAnalysisResult" class="silence-analysis-result">
                    <div class="silence-stat-row">
                        <span class="silence-stat-label" data-i18n="voice.silenceModal.originalDuration">原始音频总时长</span>
                        <span class="silence-stat-value" id="silenceOriginalDuration">--:--</span>
                    </div>
                    <div class="silence-stat-row">
                        <span class="silence-stat-label" data-i18n="voice.silenceModal.silenceDuration">可移除空白总时长</span>
                        <span class="silence-stat-value silence-removable" id="silenceSilenceDuration">--:--</span>
                    </div>
                    <div class="silence-stat-row">
                        <span class="silence-stat-label" data-i18n="voice.silenceModal.estimatedDuration">处理后预计剩余时长</span>
                        <span class="silence-stat-value silence-remaining" id="silenceEstimatedDuration">--:--</span>
                    </div>
                    <div class="silence-stat-row saving-highlight">
                        <span class="silence-stat-label" data-i18n="voice.silenceModal.savingPercentage">节省比例</span>
                        <span class="silence-stat-value" id="silenceSavingPct">0%</span>
                    </div>
                </div>

                <!-- 进度条 (裁剪时显示) -->
                <div id="silenceProgressSection" class="silence-progress-section" style="display: none;">
                    <div class="silence-progress-bar-bg">
                        <div class="silence-progress-bar" id="silenceProgressBar" style="width: 0%;"></div>
                    </div>
                    <div class="silence-progress-text">
                        <span id="silenceProgressPct">0%</span>
                        <span id="silenceProgressPhase" data-i18n="voice.silenceModal.processing">处理中...</span>
                    </div>
                </div>

                <!-- 处理完成后的下载按钮 -->
                <div id="silenceDownloadSection" class="silence-download-section" style="display: none;">
                    <div class="silence-success-msg">
                        <span data-i18n="voice.silenceModal.trimSuccess">✅ 裁剪完成！</span>
                        <span id="silenceMd5" class="silence-md5"></span>
                    </div>
                    <button class="silence-download-btn" id="silenceDownloadBtn" onclick="downloadTrimmedAudio()">
                        <span data-i18n="voice.silenceModal.downloadTrimmed">下载已处理音频</span>
                    </button>
                </div>
            </div>
            <div class="silence-modal-footer" id="silenceModalFooter">
                <button class="silence-btn-trim" id="silenceBtnTrim" onclick="useTrimmedAudio()">
                    <span data-i18n="voice.silenceModal.useTrimmed">使用智能裁剪音频</span>
                </button>
                <button class="silence-btn-original" id="silenceBtnOriginal" onclick="useOriginalAudio()">
                    <span data-i18n="voice.silenceModal.useOriginal">上传原音频</span>
                </button>
                <button class="silence-btn-cancel" id="silenceBtnCancel" onclick="cancelTrimTask()" style="display: none;">
                    <span data-i18n="voice.silenceModal.cancel">取消</span>
                </button>
            </div>
        </div>
    </div>


    <!-- 通用教程管理器 -->
    <script src="/static/libs/driver.min.js?v={{ static_asset_version|default('0', true) }}"></script>
    <script src="/static/tutorial/core/skip-controller.js?v={{ static_asset_version|default('0', true) }}"></script>
    <script src="/static/tutorial/avatar/reload-controller.js?v={{ static_asset_version|default('0', true) }}"></script>
    <script src="/static/tutorial/core/lifecycle-state-store.js?v={{ static_asset_version|default('0', true) }}"></script>
    <script src="/static/tutorial/core/page-tutorial-manager.js?v={{ static_asset_version|default('0', true) }}"></script>

    <!-- 初始化 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initPageTutorialManager === 'function') {
                initPageTutorialManager();
            }
        });
    </script>
</body>

</html>
