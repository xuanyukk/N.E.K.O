<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="memory.title">记忆浏览 - Project N.E.K.O.</title>
    <!-- i18next 加载器（统一处理 CDN 加载和初始化） -->
    <script src="/static/i18n-i18next.js?v={{ static_asset_version }}"></script>
    <link rel="stylesheet" href="/static/css/memory_browser.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/storage-location.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/window_controls.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/dark-mode.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/tutorial-styles.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/yui-guide.css?v={{ static_asset_version }}">
    <script src="/static/theme-manager.js?v={{ static_asset_version }}"></script>
    <script src="/static/js/window_controls.js?v={{ static_asset_version }}" defer></script>
</head>
<body>
    <div class="container">
        <div class="container-header page-title-bar">
            <h2 data-i18n="memory.title" data-text="Memory Browser">记忆浏览</h2>
            <div class="neko-window-controls">
                <button type="button" class="neko-window-control-btn" data-neko-window-control="minimize" data-i18n-title="common.minimize" data-i18n-aria="common.minimize" title="最小化" aria-label="最小化">
                    <span class="neko-window-minimize-icon"></span>
                </button>
                <button type="button" class="neko-window-control-btn" data-neko-window-control="maximize" data-i18n-title="common.maximize" data-i18n-aria="common.maximize" title="最大化" aria-label="最大化">
                    <span class="neko-window-maximize-icon"></span>
                </button>
                <button class="close-page-btn" onclick="closeMemoryBrowser()" data-i18n-title="common.close" data-i18n-aria="common.close" aria-label="关闭">
                    <img src="/static/icons/close_button.png" alt="" data-i18n-alt="common.close" draggable="false">
                </button>
            </div>
        </div>
        <div class="container-content">
            <div class="tips-container">
                <img src="/static/icons/exclamation.png" alt="">
                <span class="tip-text" data-i18n="memory.tip1">刚刚结束的对话内容要稍等片刻才会载入，可以重新点击猫娘名称刷新。</span>
            </div>
            <div class="main">
                <div class="left-column">
                    <div class="file-list">
                        <div class="file-list-title" data-i18n="memory.catgirlMemory">猫娘记忆库</div>
                        <ul id="memory-file-list"></ul>
                        <div class="review-toggle">
                            <div class="review-toggle-title" data-i18n="memory.autoReview">自动记忆整理</div>
                            <div class="auto-review-toggle-wrapper">
                                <input type="checkbox" id="review-toggle-checkbox">
                                <label for="review-toggle-checkbox" class="auto-review-toggle-btn">
                                    <span class="auto-review-toggle-icon"></span>
                                    <span class="auto-review-toggle-text" id="review-toggle-text" data-i18n="memory.disabled">已关闭</span>
                                </label>
                                <div class="auto-review-toggle-note" data-i18n="memory.autoReviewNote">
                                    开启后系统将自动整理和优化记忆内容，提高对话质量
                                </div>
                            </div>
                        </div>
                        <div class="review-toggle">
                            <div class="review-toggle-title" data-i18n="memory.strongMemory">强力记忆</div>
                            <div class="auto-review-toggle-wrapper">
                                <input type="checkbox" id="strong-memory-toggle-checkbox">
                                <label for="strong-memory-toggle-checkbox" class="auto-review-toggle-btn">
                                    <span class="auto-review-toggle-icon"></span>
                                    <span class="auto-review-toggle-text" id="strong-memory-toggle-text" data-i18n="memory.disabled">已关闭</span>
                                </label>
                                <div class="auto-review-toggle-note" data-i18n="memory.strongMemoryNote">
                                    开启时启用深度记忆固化（口头反馈、自动反驳检测、多通道证据累加），关闭后约可节省 40% 模型调用
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="file-list tutorial-section">
                        <div class="file-list-title" data-i18n="memory.tutorialReset">新手引导</div>
                        <div class="tutorial-reset-wrapper">
                            <select id="tutorial-reset-select">
                                <option value="" data-i18n="memory.tutorialSelectPage">-- 选择页面 --</option>
                                <option value="all" data-i18n="memory.tutorialAllPages">全部页面</option>
                                <option value="home" data-i18n="memory.tutorialPageHome">主页</option>
                                <option value="model_manager" data-i18n="memory.tutorialPageModelManager">模型设置</option>
                                <option value="parameter_editor" data-i18n="memory.tutorialPageParameterEditor">捏脸系统</option>
                                <option value="emotion_manager" data-i18n="memory.tutorialPageEmotionManager">情感管理</option>
                                <option value="chara_manager" data-i18n="memory.tutorialPageCharaManager">角色管理</option>
                                <option value="settings" data-i18n="memory.tutorialPageSettings">API设置</option>
                                <option value="voice_clone" data-i18n="memory.tutorialPageVoiceClone">语音克隆</option>
                                <option value="memory_browser" data-i18n="memory.tutorialPageMemoryBrowser">记忆浏览</option>
                                <option value="current_personality" data-i18n="memory.tutorialPageCurrentPersonality">当前角色性格</option>
                            </select>
                            <button type="button" class="auto-review-toggle-btn tutorial-reset-btn" id="tutorial-reset-btn" onclick="resetTutorialForPage(document.getElementById('tutorial-reset-select').value)" disabled>
                                <span data-i18n="memory.resetTutorialBtn">重置引导</span>
                            </button>
                        </div>
                    </div>
                    <div class="file-list storage-location-section">
                        <div class="file-list-title" data-i18n="memory.storageLocation">存储位置</div>
                        <div class="storage-location-card-mini">
                            <div class="storage-location-mini-row">
                                <span class="storage-location-mini-label" data-i18n="memory.storageCurrentRoot">当前数据位置</span>
                                <span class="storage-location-mini-value" id="storage-current-root">加载中...</span>
                            </div>
                            <div class="storage-location-mini-status" id="storage-location-status"></div>
                            <button type="button" class="storage-location-manage-btn" id="storage-location-manage-btn" disabled>
                                <span data-i18n="memory.changeStorageLocation">更改存储位置</span>
                            </button>
                            <button type="button" class="storage-location-open-btn" id="storage-location-open-btn" disabled>
                                <span data-i18n="memory.openCurrentStorageRoot">打开当前目录</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="editor">
                    <div class="editor-title" data-i18n="memory.chatHistory">聊天记录</div>
                    <div id="memory-chat-edit"></div>
                    <div class="editor-actions" id="save-row" style="display:none;">
                        <span id="save-status"></span>
                        <div class="actions-right">
                            <button class="save-btn" id="save-memory-btn" data-i18n="memory.save">
                                <span>保存</span>
                            </button>
                            <button class="clear-btn" id="clear-memory-btn" data-i18n="memory.clear">
                                <span>清空</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="storage-location-modal-backdrop" id="storage-location-modal" hidden>
        <div class="storage-location-modal-card" role="dialog" aria-modal="true" aria-labelledby="storage-location-modal-title">
            <div class="storage-location-modal-head">
                <h3 id="storage-location-modal-title" data-i18n="memory.storageManagementTitle">更改存储位置</h3>
                <button type="button" class="storage-location-modal-close" id="storage-location-modal-close" data-i18n-title="common.close" data-i18n-aria="common.close" aria-label="关闭">×</button>
            </div>
            <div class="storage-location-modal-body">
                <div class="storage-location-modal-field">
                    <span class="storage-location-modal-label" data-i18n="memory.storageCurrentRoot">当前数据位置</span>
                    <span class="storage-location-modal-value" id="storage-modal-current-root">-</span>
                </div>
                <label class="storage-location-modal-field" for="storage-target-root-input">
                    <span class="storage-location-modal-label" data-i18n="memory.storageTargetRoot">目标位置</span>
                    <input type="text" id="storage-target-root-input" class="storage-location-target-input" data-i18n-placeholder="memory.storageTargetPlaceholder" placeholder="选择或输入新的数据位置">
                </label>
                <div class="storage-location-modal-actions">
                    <button type="button" class="storage-location-open-btn" id="storage-location-pick-btn">
                        <span data-i18n="memory.storagePickTarget">选择位置</span>
                    </button>
                    <button type="button" class="storage-location-restart-btn" id="storage-location-restart-btn">
                        <span data-i18n="memory.storageConfirmRestart">确认并重启</span>
                    </button>
                </div>
                <div class="storage-location-preflight-result" id="storage-location-preflight-result"></div>
            </div>
        </div>
    </div>
    <script src="/static/app-storage-location.js?v={{ static_asset_version }}" data-storage-location-auto-start="false"></script>
    <script src="/static/js/memory_browser.js?v={{ static_asset_version }}"></script>

    <!-- Driver.js 库 -->
    <script src="/static/libs/driver.min.js?v={{ static_asset_version }}"></script>
    <link rel="stylesheet" href="/static/libs/driver.min.css?v={{ static_asset_version }}">

    <script src="/static/tutorial/core/guide-helpers.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/scoped-resources.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/bridge-command-bus.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/target-geometry-registry.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/chat-window-adapter.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/command-registry.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/script-normalizer.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/timeline-engine.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/visual-runtime.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/yui-guide/common.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/yui-guide/steps.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/yui-guide/overlay.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/yui-guide/page-handoff.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/interaction-takeover.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/visual/spotlight-controller.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/visual/ghost-cursor-controller.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/visual/petal-transition-controller.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/visual/highlight-controller.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/visual/controllers.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/visual/resistance-controllers.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/operation-registry.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/settings-tour-flow.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/scene-orchestrator.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/yui-guide/director.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/skip-controller.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/avatar/reload-controller.js?v={{ static_asset_version }}"></script>
    <!-- 通用教程管理器 -->
    <script src="/static/tutorial/core/lifecycle-state-store.js?v={{ static_asset_version }}"></script>
    <script src="/static/tutorial/core/universal-manager.js?v={{ static_asset_version }}"></script>

    <!-- 初始化 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initUniversalTutorialManager === 'function') {
                initUniversalTutorialManager();
            }
        });
    </script>
</body>

</html>
