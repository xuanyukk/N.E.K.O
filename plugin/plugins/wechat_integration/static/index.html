<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="ui.page.title">微信登录</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <header><h1 class="page-title" data-i18n="ui.page.title">微信登录</h1></header>

        <!-- QR Code Card -->
        <section class="qrcode-section qrcode-card" id="qrcode-card">
            <div class="status-head">
                <span class="status-title" data-i18n="ui.qrcode.title">登录二维码</span>
                <span id="login-status-pill" class="status-pill" data-i18n="ui.status.idle">未登录</span>
            </div>
            <div class="qrcode-body">
                <!-- Hint text (hidden when logged in or QR active) -->
                <p class="field-hint" id="qrcode-hint" data-i18n="ui.qrcode.hint">请使用手机微信扫一扫，在手机上确认登录。二维码有效期约 5 分钟。</p>
                <div class="qrcode-wrapper">
                    <img id="qrcode-image" alt="QR Code" style="display:none;" />
                    <div id="qrcode-loading" class="empty-state qrcode-placeholder" style="display:none;">
                        <span class="qrcode-placeholder-icon">⏳</span>
                        <span data-i18n="ui.qrcode.loading">正在获取二维码...</span>
                    </div>
                    <div id="qrcode-empty" class="empty-state qrcode-placeholder">
                        <span class="qrcode-placeholder-icon">📱</span>
                        <span data-i18n="ui.qrcode.empty">点击下方按钮获取二维码</span>
                    </div>
                    <!-- Account info overlay (shown after login, replaces QR area) -->
                    <div id="account-overlay" class="account-overlay" style="display:none;">
                        <span class="account-icon">✅</span>
                        <span class="account-title" data-i18n="ui.account.title">登录成功</span>
                        <div class="account-info-row">
                            <span class="account-label" data-i18n="ui.account.account_id">Account ID</span>
                            <span id="status-account-id" class="account-value">-</span>
                        </div>
                        <div class="account-info-row">
                            <span class="account-label" data-i18n="ui.account.user_id">User ID</span>
                            <span id="status-user-id" class="account-value">-</span>
                        </div>
                    </div>
                </div>
                <div id="login-tips" class="login-tips" style="display:none;">
                    <p data-i18n="ui.qrcode.waiting">等待扫码中，请在手机上确认登录...</p>
                </div>
            </div>
            <div class="qrcode-actions">
                <button id="qrcode-toggle" class="ghost-action" type="button" onclick="toggleQrcodeCard()" data-i18n="ui.qrcode.toggle.hide">隐藏</button>
                <button id="btn-start-login" class="ghost-action" type="button" onclick="startLogin()" data-i18n="ui.qrcode.start">开始扫码登录</button>
                <button id="btn-refresh-qrcode" class="ghost-action" type="button" onclick="refreshQrcode()" data-i18n="ui.qrcode.refresh">刷新二维码</button>
                <button id="btn-logout" class="danger-action" type="button" onclick="logout()" data-i18n="ui.actions.logout" style="display:none;">退出登录</button>
            </div>
            <div id="qrcode-error" class="qrcode-error" style="display:none;"></div>
        </section>

        <!-- Message Monitor -->
        <section class="config-section" id="monitor-section">
            <div class="status-head">
                <span class="status-title" data-i18n="ui.monitor.title">消息监听</span>
                <span id="monitor-status-pill" class="status-pill" data-i18n="ui.monitor.stopped">已停止</span>
            </div>
            <p class="field-hint" data-i18n="ui.monitor.hint">登录后即可开始监听微信消息。收到消息后 AI 会自动生成回复并发送。</p>
            <div class="save-row">
                <button id="btn-start-monitor" class="primary-action" type="button" onclick="startAutoReply()" data-i18n="ui.monitor.start">开始监听</button>
                <button id="btn-stop-monitor" class="ghost-action" type="button" onclick="stopAutoReply()" data-i18n="ui.monitor.stop" style="display:none;">停止监听</button>
            </div>
        </section>

        <!-- Settings -->
        <section class="config-section" id="config-section">
            <span class="status-title" data-i18n="ui.config.section">API 设置</span>
            <div class="form-group">
                <label class="field-label" for="cfg-base-url" data-i18n="ui.config.base_url.label">API 基础地址</label>
                <input type="text" id="cfg-base-url" class="input-control" placeholder="https://ilinkai.weixin.qq.com">
                <div class="field-hint" data-i18n="ui.config.base_url.hint">微信 OpenClaw API 的基础 URL，一般不需要修改。</div>
            </div>
            <div class="form-group">
                <label class="field-label" for="cfg-bot-type" data-i18n="ui.config.bot_type.label">Bot 类型</label>
                <input type="text" id="cfg-bot-type" class="input-control" placeholder="3">
                <div class="field-hint" data-i18n="ui.config.bot_type.hint">微信 Bot 类型编号，默认为 3。</div>
            </div>
            <div class="save-row">
                <button class="primary-action" id="save-settings-btn" data-i18n="ui.actions.save_settings">保存设置</button>
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>
    <script src="./i18n.js"></script>
    <script src="./script.js?v=0.1.3"></script>
</body>
</html>
