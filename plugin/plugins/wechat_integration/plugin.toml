[plugin]
name = "微信集成"
description = "通过 OpenClaw API 连接微信个人号，支持扫码登录、消息监听和自动回复。"
short_description = "微信个人号扫码登录与集成。"
keywords = ["wechat", "openclaw", "qr-login", "weixin"]
passive = false
version = "0.1.3"
id = "wechat_integration"
type = "plugin"
entry = "plugin.plugins.wechat_integration:WechatIntegrationPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.store]
enabled = false

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "微信登录"
entry = "static/index.html"
context = "wechat_integration"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "doc/README.md"
permissions = ["state:read"]

[plugin_runtime]
enabled = true
auto_start = false
