[plugin]
id = "neko_roast"
name = "NEKO Live"
description = "NEKO 的直播互动中心：连接支持的平台直播互动，承载弹幕、观众档案与锐评流程。"
short_description = "NEKO 的直播互动中心。"
keywords = [
    "bilibili",
    "danmaku",
    "avatar",
    "roast",
    "neko_live",
    "live_center",
    "直播互动",
    "弹幕锐评",
    "观众",
]
passive = true
version = "0.1.0"
entry = "plugin.plugins.neko_roast:NekoRoastPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "NEKO Live"
entry = "ui/panel_compat.tsx"
context = "dashboard"
permissions = [
    "state:read",
    "config:read",
    "action:call",
]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "docs/quickstart.md"
mode = "markdown"
permissions = [
    "state:read",
]

[[plugin.ui.guide]]
id = "development"
title = "开发文档"
entry = "docs/development.md"
mode = "markdown"
permissions = [
    "state:read",
]

[[plugin.ui.guide]]
id = "solo_stream_test"
title = "猫猫独播体验指南"
entry = "docs/solo-stream-test-guide.md"
mode = "markdown"
permissions = [
    "state:read",
]

[plugin.store]
enabled = true

[plugin_runtime]
enabled = true
auto_start = false

[neko_roast]
live_platform = "bilibili"
live_room_ref = ""
live_room_id = 0
live_mode = "co_stream"
live_enabled = false
avatar_roast_enabled = true
avatar_analysis_enabled = true
danmaku_response_enabled = true
live_support_events_enabled = true
warmup_hosting_enabled = true
idle_hosting_enabled = true
active_engagement_enabled = true
developer_tools_enabled = false
dry_run = false
roast_once_per_uid = true
roast_strength = "normal"
co_stream_output_policy = "auto_low_interrupt"
solo_output_policy = "auto_rate_limited"
avatar_fetch_timeout_seconds = 8
recent_limit = 30
rate_limit_seconds = 20
queue_limit = 3
safety_auto_stop_enabled = true
safety_window_seconds = 60
safety_pipeline_failure_limit = 3
safety_output_failure_limit = 2
safety_queue_overflow_limit = 3
viewer_store_dir = ""
activity_level = "standard"
stream_theme = ""
stream_goal = ""
stream_columns = ""
stream_avoid_topics = ""
